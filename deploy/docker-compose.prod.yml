services:
  backend:
    build: ../backend
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://jansewa:jansewa_secret@postgres:5432/jansewa_db
      DATABASE_SYNC_URL: postgresql://jansewa:jansewa_secret@postgres:5432/jansewa_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ../frontend
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jansewa
      POSTGRES_PASSWORD: jansewa_secret
      POSTGRES_DB: jansewa_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jansewa -d jansewa_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  pgdata:
  backend_uploads:
